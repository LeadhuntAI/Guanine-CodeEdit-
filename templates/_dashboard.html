{# ================================================================
   DASHBOARD VIEW — Agent session overview cards
   Displayed inside the sidebar when "dashboard" view is selected.
   ================================================================ #}

<div class="sidebar-header">
    Dashboard
    <button class="dash-new-btn" onclick="dashNewSession()" title="New Session">+ New</button>
</div>

<div class="dash-filters">
    <button class="dash-filter active" data-filter="all" onclick="dashFilter('all')">All</button>
    <button class="dash-filter" data-filter="running" onclick="dashFilter('running')">Running</button>
    <button class="dash-filter" data-filter="completed" onclick="dashFilter('completed')">Done</button>
    <button class="dash-filter" data-filter="review" onclick="dashFilter('review')">Review</button>
</div>

<div class="dash-cards" id="dashCards">
    <div class="dash-loading">Loading sessions...</div>
</div>

<style>
.dash-new-btn {
    margin-left: auto; background: #0d6efd; color: #fff; border: none;
    border-radius: 3px; font-size: 0.62rem; padding: 2px 8px; cursor: pointer;
}
.dash-new-btn:hover { background: #2b7fff; }
.dash-filters {
    display: flex; gap: 4px; padding: 6px 10px; border-bottom: 1px solid #2d2d2d;
    flex-shrink: 0;
}
.dash-filter {
    background: none; border: 1px solid #333; color: #888; border-radius: 3px;
    font-size: 0.62rem; padding: 2px 8px; cursor: pointer;
}
.dash-filter:hover { color: #ccc; border-color: #555; }
.dash-filter.active { color: #fff; border-color: #0d6efd; background: rgba(13,110,253,0.15); }
.dash-cards {
    flex: 1; overflow-y: auto; padding: 8px 10px; display: flex;
    flex-direction: column; gap: 8px;
}
.dash-cards::-webkit-scrollbar { width: 5px; }
.dash-cards::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
.dash-loading { color: #555; font-size: 0.72rem; text-align: center; padding: 20px 0; }
.dash-empty { color: #555; font-size: 0.72rem; text-align: center; padding: 20px 0; }

/* Session card */
.dash-card {
    background: #1e2228; border: 1px solid #2d2d2d; border-radius: 6px;
    padding: 10px; cursor: pointer; transition: border-color 0.15s;
}
.dash-card:hover { border-color: #555; }
.dash-card-header {
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
}
.dash-card-status {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.dash-card-status.pending { background: #888; }
.dash-card-status.running { background: #3b82f6; animation: pulse-dot 1.5s infinite; }
.dash-card-status.completed { background: #22c55e; }
.dash-card-status.review { background: #eab308; }
.dash-card-status.merged { background: #a855f7; }
.dash-card-status.rejected { background: #ef4444; }
.dash-card-status.error { background: #ef4444; }
.dash-card-task {
    font-size: 0.72rem; color: #ccc; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; flex: 1;
}
.dash-card-badge {
    font-size: 0.58rem; padding: 1px 5px; border-radius: 3px;
    text-transform: uppercase; font-weight: 600; flex-shrink: 0;
}
.dash-card-badge.running { background: rgba(59,130,246,0.2); color: #93c5fd; }
.dash-card-badge.completed { background: rgba(34,197,94,0.2); color: #86efac; }
.dash-card-badge.review { background: rgba(234,179,8,0.2); color: #fde68a; }
.dash-card-badge.merged { background: rgba(168,85,247,0.2); color: #d8b4fe; }
.dash-card-badge.rejected { background: rgba(239,68,68,0.2); color: #fca5a5; }
.dash-card-badge.pending { background: rgba(136,136,136,0.2); color: #aaa; }
.dash-card-badge.error { background: rgba(239,68,68,0.2); color: #fca5a5; }
.dash-card-meta {
    font-size: 0.62rem; color: #666; display: flex; gap: 8px; margin-bottom: 6px;
}
.dash-card-files {
    font-size: 0.65rem; color: #888; margin-bottom: 6px;
}
.dash-card-file {
    display: flex; align-items: center; gap: 4px; padding: 1px 0;
    font-family: 'Cascadia Code','Consolas',monospace; font-size: 0.62rem;
}
.dash-card-file .file-stat { color: #666; }
.dash-card-file .file-stat.added { color: #22c55e; }
.dash-card-file .file-stat.removed { color: #ef4444; }
.dash-card-actions {
    display: flex; gap: 4px; margin-top: 6px;
}
.dash-card-btn {
    font-size: 0.6rem; padding: 2px 8px; border-radius: 3px; border: 1px solid #444;
    background: #252a32; color: #aaa; cursor: pointer;
}
.dash-card-btn:hover { background: #333; color: #ccc; }
.dash-card-btn.primary { border-color: #0d6efd; color: #6fb3f2; }
.dash-card-btn.success { border-color: #22c55e; color: #86efac; }
.dash-card-btn.danger { border-color: #ef4444; color: #fca5a5; }

/* Child sessions (sub-agents) */
.dash-card-children {
    margin-top: 6px; padding-left: 12px; border-left: 2px solid #333;
}
.dash-child-row {
    display: flex; align-items: center; gap: 6px; padding: 3px 0;
    font-size: 0.65rem; color: #888; cursor: pointer;
}
.dash-child-row:hover { color: #ccc; }
</style>
