{% extends "base.html" %}
{% block title %}Extracting... - File Recovery Merger{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body text-center py-5">
                <h3 id="statusTitle">Extracting editor history...</h3>
                <p class="text-muted" id="statusDetail">Initializing...</p>

                <div class="progress mb-4" style="height: 24px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-warning"
                         id="progressBar" role="progressbar" style="width: 5%">Scanning...</div>
                </div>

                <div id="messages" class="text-start mb-4"></div>
                <div id="errorLog" class="text-start text-danger small" style="max-height: 200px; overflow-y: auto;"></div>

                <div id="doneSection" style="display: none;" class="mt-4">
                    <div class="row g-3 mb-4" id="statsRow"></div>
                    <a href="/setup" class="btn btn-primary btn-lg">Use as Source in Setup</a>
                    <a href="/extract-history" class="btn btn-outline-secondary btn-lg ms-2">Extract Again</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const evtSource = new EventSource('/extract-events');
const progressBar = document.getElementById('progressBar');
const statusTitle = document.getElementById('statusTitle');
const statusDetail = document.getElementById('statusDetail');
const messages = document.getElementById('messages');
const errorLog = document.getElementById('errorLog');
const doneSection = document.getElementById('doneSection');
const statsRow = document.getElementById('statsRow');

evtSource.onmessage = function(event) {
    const data = JSON.parse(event.data);

    switch (data.type) {
        case 'info':
            messages.innerHTML += `<div class="mb-1 small"><span class="badge bg-info">INFO</span> ${data.message}</div>`;
            statusDetail.textContent = data.message;
            break;

        case 'scanning':
            messages.innerHTML += `<div class="mb-1 small"><span class="badge bg-secondary">${data.source}</span> ${data.count} history entries</div>`;
            statusDetail.textContent = `Scanning: ${data.source}...`;
            break;

        case 'progress':
            statusDetail.textContent = `Scanned ${data.scanned} dirs, found ${data.matched} project files...`;
            progressBar.style.width = '40%';
            progressBar.textContent = `${data.matched} files found`;
            break;

        case 'copy_progress':
            const pct = Math.round((data.done / data.total) * 100);
            progressBar.style.width = `${Math.max(40, pct)}%`;
            progressBar.textContent = `Copying: ${data.done}/${data.total}`;
            statusDetail.textContent = `Copying files: ${data.done} of ${data.total}...`;
            break;

        case 'error':
            errorLog.innerHTML += `<div>${data.message}</div>`;
            break;

        case 'done':
            evtSource.close();
            const r = data.result;
            progressBar.style.width = '100%';
            progressBar.textContent = 'Done!';
            progressBar.classList.remove('progress-bar-animated', 'bg-warning');
            progressBar.classList.add('bg-success');
            statusTitle.textContent = 'Extraction Complete!';
            statusDetail.textContent = `${r.extracted} files extracted from ${r.sources_found} history source(s).`;

            statsRow.innerHTML = `
                <div class="col-md-3"><div class="stat-card bg-dark border border-success"><div class="number text-success">${r.extracted}</div><div class="label">Extracted</div></div></div>
                <div class="col-md-3"><div class="stat-card bg-dark border"><div class="number">${r.total_unique}</div><div class="label">Unique Files</div></div></div>
                <div class="col-md-3"><div class="stat-card bg-dark border border-info"><div class="number text-info">${r.project_matches}</div><div class="label">Project Matches</div></div></div>
                <div class="col-md-3"><div class="stat-card bg-dark border border-warning"><div class="number text-warning">${r.errors}</div><div class="label">Errors</div></div></div>
            `;
            doneSection.style.display = 'block';
            break;
    }
};

evtSource.onerror = function() {
    evtSource.close();
    statusTitle.textContent = 'Connection lost';
    statusDetail.textContent = 'The extraction may still be running. Refresh to check.';
};
</script>
{% endblock %}
