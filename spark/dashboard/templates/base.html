<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spark Dashboard{% block title_suffix %}{% endblock %}</title>
{% block head_extra %}{% endblock %}
<style>
:root {
  --bg: #0d1117;
  --bg-card: #161b22;
  --bg-hover: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --yellow: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Nav */
nav {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
}
nav .logo {
  font-weight: 700;
  font-size: 15px;
  color: var(--accent);
  margin-right: 24px;
  padding: 12px 0;
  letter-spacing: 0.5px;
}
nav a.nav-link {
  padding: 12px 16px;
  color: var(--text-dim);
  font-size: 14px;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
nav a.nav-link:hover { color: var(--text); text-decoration: none; }
nav a.nav-link.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}

/* Main */
main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}
h1 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 16px;
}
h2 {
  font-size: 16px;
  font-weight: 600;
  margin: 24px 0 12px;
  color: var(--text-dim);
}

/* Cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.card .value { font-size: 28px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }

/* Tables */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 2px solid var(--border);
  color: var(--text-dim);
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  font-size: 12px;
}
tr:hover { background: var(--bg-hover); }

/* Badges */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.badge-green { background: rgba(63, 185, 80, 0.15); color: var(--green); }
.badge-yellow { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }
.badge-red { background: rgba(248, 81, 73, 0.15); color: var(--red); }
.badge-grey { background: rgba(139, 148, 158, 0.15); color: var(--text-dim); }
.badge-blue { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
.badge-purple { background: rgba(188, 140, 255, 0.15); color: var(--purple); }

/* Progress bar */
.bar {
  display: flex;
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  background: var(--border);
  margin: 8px 0;
}
.bar-seg { height: 100%; transition: width 0.3s; }
.bar-green { background: var(--green); }
.bar-yellow { background: var(--yellow); }
.bar-grey { background: var(--text-dim); opacity: 0.3; }

/* Feed */
.feed { list-style: none; }
.feed li {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.feed .time {
  color: var(--text-dim);
  font-family: monospace;
  font-size: 11px;
  white-space: nowrap;
  min-width: 160px;
}
.feed .icon {
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}
.feed .desc {
  font-family: monospace;
  font-size: 12px;
  word-break: break-all;
}

/* Filters */
.filters {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.filters a {
  padding: 4px 12px;
  border-radius: 16px;
  font-size: 13px;
  color: var(--text-dim);
  border: 1px solid var(--border);
}
.filters a:hover, .filters a.active {
  color: var(--text);
  border-color: var(--accent);
  text-decoration: none;
}

/* Changed file row highlights */
tr.row-major { background: rgba(248, 81, 73, 0.08); }
tr.row-major:hover { background: rgba(248, 81, 73, 0.15); }
tr.row-moderate { background: rgba(210, 153, 34, 0.08); }
tr.row-moderate:hover { background: rgba(210, 153, 34, 0.15); }
tr.row-minor { background: rgba(210, 153, 34, 0.04); }

/* Collapsible details */
details summary { list-style: none; }
details summary::-webkit-details-marker { display: none; }
details summary::before {
  content: "\25B6\FE0E ";
  font-size: 10px;
  color: var(--text-dim);
  transition: transform 0.15s;
  display: inline-block;
}
details[open] summary::before { transform: rotate(90deg); }

/* Markdown display */
.md-content {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px 32px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-wrap: break-word;
  overflow-x: auto;
}
.md-content h1, .md-content h2, .md-content h3 { color: var(--text); margin-top: 20px; }
.md-content table { margin: 12px 0; }
.md-content code {
  background: rgba(88, 166, 255, 0.1);
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 13px;
}

/* Info box */
.info-box {
  background: rgba(88, 166, 255, 0.06);
  border: 1px solid rgba(88, 166, 255, 0.2);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 20px;
  font-size: 13px;
}
.info-box .info-label {
  font-size: 11px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
  margin-bottom: 6px;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 48px;
  color: var(--text-dim);
}
</style>
</head>
<body>
<nav>
  <span class="logo">SPARK</span>
  <a href="/overview" class="nav-link {% if page == 'overview' %}active{% endif %}">Overview</a>
  <a href="/files" class="nav-link {% if page == 'files' %}active{% endif %}">Files</a>
  <a href="/runs" class="nav-link {% if page == 'runs' %}active{% endif %}">Runs</a>
  <a href="/activity" class="nav-link {% if page == 'activity' %}active{% endif %}">Activity</a>
  <a href="/docs" class="nav-link {% if page == 'docs' %}active{% endif %}">Docs</a>
</nav>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
